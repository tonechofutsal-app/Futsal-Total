<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, touch-action=manipulation">
    <title>Futsal Pro - v19.2</title>
    <style>
        :root { 
            --pista-azul: #0D47A1; --linea: #FFFFFF; --led-verde: #00E676;
            --led-rojo: #FF1744; --led-azul-tiempo: #0026e6;
            --area-color: rgba(255, 255, 255, 0.1);
            --portero-color: #C0C0C0;
            --linea-porteria: #FF1744;
            --accent: #9C27B0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #000; color: white; 
            height: 100svh; width: 100vw; overflow: hidden; 
            position: fixed; overscroll-behavior: none;
            touch-action: none;
        }

        .controles-navegacion {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10000;
        }
        
        .btn-header-top {
            width: 48px; height: 48px; background: #222; border: 2px solid #444;
            color: white; border-radius: 10px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
            flex-shrink: 0; transition: all 0.2s;
        }
        .btn-header-top:hover { background: #333; border-color: var(--led-verde); }

        #pantalla-config { 
            position: fixed; inset: 0; background: #0a0a0a; z-index: 9000; 
            display: flex; flex-direction: column; padding: 15px; overflow-y: auto; 
        }

        .contenedor-plantillas { display: flex; gap: 10px; flex-shrink: 0; margin-bottom: 15px; }
        .cuadro-equipo { flex: 1; background: #161616; padding: 12px; border-radius: 12px; border: 2px solid #333; }
        
        .fila-input-jugador { display: flex; gap: 4px; margin-bottom: 4px; }
        .input-num { width: 35px; background: #333; border: 1px solid #555; color: var(--led-verde); text-align: center; border-radius: 4px; font-weight: bold; }
        .input-nom { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 6px; border-radius: 4px; font-size: 13px; }

        #interfaz-partido { display: none; flex-direction: column; height: 100svh; width: 100vw; }
        
        #contenedor-cabecera-global { 
            height: 115px; width: 100%; display: flex; 
            background: #000; border-bottom: 3px solid #333; flex-shrink: 0; 
            align-items: center; padding: 0 10px; gap: 10px;
        }

        #cabecera-marcador { 
            flex: 1; height: 100%; display: flex; 
            align-items: center; justify-content: space-around; 
            gap: 10px; padding: 2px 0;
        }
        
        .bloque-goles { min-width: 90px; height: 90%; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; }
        .bg-goles-local { background: #FFD600; color: #000; }
        .bg-goles-rival { background: #D50000; color: #fff; }
        .goles-txt { font-size: 4.5rem; font-family: 'Courier New', monospace; font-weight: bold; line-height: 0.8; }
        
        .contenedor-nombre { flex: 2; text-align: center; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .nombre-completo { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .bg-tiempo { 
            background: var(--led-azul-tiempo); border: 3px solid #fff; 
            flex: 1.5; height: 90%; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 220px;
        }
        #cronometro { font-size: 5rem; font-family: 'Courier New', monospace; color: var(--led-verde); font-weight: bold; line-height: 0.8; }
        
        .cuerpo-app { display: flex; flex-grow: 1; overflow: hidden; background: #111; position: relative; }
        .col-banquillo { width: 150px; background: #0a0a0a; padding: 5px; overflow-y: auto; border: 1px solid #222; flex-shrink: 0; touch-action: none; }
        .seccion-pista { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 5px; overflow: hidden; }
        .campo { position: relative; height: 95%; aspect-ratio: 2 / 1; background: var(--pista-azul); border: 3px solid var(--linea); touch-action: none; }
        
        #capa-jugadores { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        .jugador { position: absolute; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; z-index: 110; transform: translate(-50%, -50%); touch-action: none; pointer-events: auto; font-weight: bold; }
        
        .nombre-jugador-pista { position: absolute; top: 105%; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 0.7rem; color: #fff; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; pointer-events: none; text-transform: uppercase; border: 1px solid #444; }

        .controles { height: 85px; padding: 8px 5px; display: flex; gap: 4px; background: #000; border-top: 3px solid #444; justify-content: center; flex-shrink: 0; }
        .btn-footer { height: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 0.6rem; flex: 1; text-transform: uppercase; transition: border 0.1s; }

        #menu-acciones { position: fixed; display: none; background: #1a1a1a; border: 2px solid #555; border-radius: 12px; z-index: 10000; width: 170px; box-shadow: 0 4px 30px rgba(0,0,0,0.9); overflow: hidden; }
        .opt-accion { padding: 15px; text-align: center; font-weight: bold; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.9rem; }
        
        #modal-stats { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 11000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tabla-stats { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.75rem; }
        .tabla-stats th, .tabla-stats td { border: 1px solid #444; padding: 6px 4px; text-align: center; }
        .tabla-stats th { background: #222; color: var(--led-verde); }

        .linea-medio { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--linea); }
        .circulo-central { position: absolute; left: 50%; top: 50%; width: 15%; aspect-ratio: 1/1; border: 2px solid var(--linea); border-radius: 50%; transform: translate(-50%, -50%); }
        .area-6m { position: absolute; top: 15%; height: 70%; width: 15%; border: 2px solid var(--linea); background: var(--area-color); }
        .area-izq { left: 0; border-radius: 0 100% 100% 0 / 0 50% 50% 0; border-left:none; }
        .area-der { right: 0; border-radius: 100% 0 0 100% / 50% 0 0 50%; border-right:none; }
        .porteria { position: absolute; top: 40%; height: 20%; width: 6px; background: var(--linea-porteria); z-index: 2; }
    </style>
</head>
<body onclick="activarKeepAwake()" oncontextmenu="return false;">

<video id="keep-awake-video" loop muted playsinline style="display:none;">
    <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc292bXA0AAADGm1vb3YAAABsbXZoZAAAAADbe6vA23urwAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAABidHJhazAAAAZ0a2hkAAAAB9t7q8Dbe6vAAAAAAQAAAAAAA+gAAAAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAABAAAAAAUAAAAFAAAAAAAAkZWR0cwAAABxlbHN0AAAAAAAAAAEAAAPoAAAAAAABAAAAAAHibWRpYQAAACBtZGhkAAAAANt7q8Dbe6vAAAAAAUAAAAAAAABVAAAAAAAhaG1scgAAAAAAAAAAdmlkZQAAAAAAAAAAAAAAAFZpZGVvSGFuZGxlcgAAAAG5bWluZgAAABZ2bWhkAAAAAQAAAAAAAAAAAAAAACRkaW5mAAAAHGRyZWYAAAAAAAAAAQAAAAxtZWRpYQAAAAEAAAB6c3RibAAAAGZzdHNkAAAAAAAAAAEAAABWavBjMP8AAAAAAAgAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAUABQAAAAAABhdmMxAQAAAAL/AAAAFmF2Y0MBQAL/AAL/AAAAAAAIAAAD6AAAAfQAAABMc3R0cwAAAAAAAAABAAAAAQAAAfQAAABMc3RzYwAAAAAAAAABAAAAAQAAAAEAAAABAAAAFHN0c3oAAAAAAAAAAAABAAAB9AAAABRzdGNvAAAAAAAAAAEAAAA4AAAAYnVkdGEAAABabWV0YQAAAAAAAAAhaGRscgAAAAAAAAAAbWRpdir6AAAAYXBwbAAAAClpbHN0AAAAYal0b28AAABhZGF0YQAAAAEAAAAAAAAAAAAAAABmcmVlAAAAG21kYXQAAAAVAAAAAf///+7u7u7u7u7u7u7vAAAAFv///+7u7u7u7u7u7u7v">
</video>

<div class="controles-navegacion">
    <button onclick="window.location.href='index.html'" class="btn-header-top" title="Volver al Menú">🏠</button>
    <button onclick="toggleFullScreen()" class="btn-header-top" title="Pantalla Completa">⛶</button>
</div>

<datalist id="list-temporadas"></datalist>
<datalist id="list-equipos"></datalist>
<datalist id="list-jugadores-local"></datalist>
<datalist id="list-jugadores-rival"></datalist>

<div id="pantalla-config">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin:0; color:var(--led-verde)">CONFIGURACIÓN</h2>
    </div>
    
    <div style="margin-bottom: 15px;">
        <input type="text" id="temporada-act" list="list-temporadas" onmousedown="this.value=''" onchange="guardarSesion();" placeholder="TEMPORADA" style="padding:12px; border-radius:8px; border:2px solid #333; background:#222; color:var(--led-verde); font-weight:bold; width:100%">
    </div>

    <div class="contenedor-plantillas">
        <div class="cuadro-equipo">
            <input type="text" id="nombre-local" list="list-equipos" onmousedown="this.value=''" oninput="actualizarDatalistJugadores('local')" onchange="guardarSesion();" placeholder="LOCAL" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none; background:#ffd600; color:black; font-weight:bold; width:100%">
            <div id="inputs-local"></div>
        </div>
        <div class="cuadro-equipo">
            <input type="text" id="nombre-rival" list="list-equipos" onmousedown="this.value=''" oninput="actualizarDatalistJugadores('rival')" onchange="guardarSesion();" placeholder="RIVAL" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none; background:#d50000; color:white; font-weight:bold; width:100%">
            <div id="inputs-rival"></div>
        </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; padding-bottom:40px;">
        <button onclick="iniciarPartido()" style="background:#4CAF50; color:white; padding:15px; font-size:1.3rem; border:none; border-radius:12px; cursor:pointer; font-weight:bold">ENTRAR AL PARTIDO</button>
        <button onclick="borrarTodo()" style="background:#444; color:white; padding:10px; border:none; border-radius:8px; cursor:pointer;">BORRAR HISTORIAL</button>
    </div>
</div>

<div id="interfaz-partido">
    <div id="contenedor-cabecera-global">
        <button onclick="volverAConfig()" class="btn-header-top">←</button>
        <div id="cabecera-marcador">
            <div class="bloque-goles bg-goles-local">
                <div id="g-l" class="goles-txt">0</div>
                <div id="f-l" style="font-size:0.9rem; font-weight:bold">F: 0</div>
            </div>
            <div class="contenedor-nombre" onclick="manejadorClickCabecera('LOCAL')"><div id="d-l-cont" class="nombre-completo" style="color:#FFD600">LOCAL</div></div>
            <div class="bg-tiempo">
                <div id="label-parte" style="font-size:1rem; color:#fff; font-weight:bold; margin-bottom:2px;">1ª PARTE</div>
                <div id="cronometro">20:00</div>
            </div>
            <div class="contenedor-nombre" onclick="manejadorClickCabecera('RIVAL')"><div id="d-v-cont" class="nombre-completo" style="color:#D50000">RIVAL</div></div>
            <div class="bloque-goles bg-goles-rival">
                <div id="g-v" class="goles-txt">0</div>
                <div id="f-v" style="font-size:0.9rem; font-weight:bold">F: 0</div>
            </div>
        </div>
    </div>

    <div class="cuerpo-app">
        <div class="col-banquillo" id="banquillo-local"></div>
        <div class="seccion-pista">
            <div class="campo" id="pista" onclick="cerrarMenuAcciones(); deseleccionarJugador();">
                <div class="linea-medio"></div><div class="circulo-central"></div>
                <div class="area-6m area-izq"></div><div class="area-6m area-der"></div>
                <div class="porteria" style="left:-3px; top:40%; height:20%; width:6px; background:var(--linea-porteria);"></div>
                <div class="porteria" style="right:-3px; top:40%; height:20%; width:6px; background:var(--linea-porteria);"></div>
                <div id="capa-jugadores"></div>
            </div>
        </div>
        <div class="col-banquillo" id="banquillo-rival"></div>
    </div>

    <div class="controles">
        <button class="btn-footer" style="background:#333" onclick="permutarCampo()">⇄ PISTA</button>
        <button class="btn-footer" id="btn-stop" style="background:var(--led-rojo)" onclick="pararJuego()">STOP</button>
        <button class="btn-footer" id="btn-play" style="background:#2e7d32" onclick="iniciarJuego()">PLAY</button>
        <button class="btn-footer" id="btn-acciones" style="background:#673AB7" onclick="toggleModo('acciones')">ACCIONES</button>
        <button class="btn-footer" id="btn-timeout" style="background:#FF5722" onclick="toggleModo('timeout')">T. MUERTO</button>
        <button class="btn-footer" style="background:#E91E63" onclick="alternarParte()">PARTE</button>
        <button class="btn-footer" id="btn-stats" style="background:#009688" onclick="toggleModo('stats')">ESTADISTICAS</button>
        <button class="btn-footer" style="background:#795548" onclick="exportarEstadisticas()">EXP</button>
    </div>
</div>

<div id="modal-stats">
    <div id="contenido-stats"></div>
    <button onclick="document.getElementById('modal-stats').style.display='none'; document.getElementById('modal-stats').style.pointerEvents='none';" style="width:100%; padding:15px; background:var(--led-rojo); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">CERRAR</button>
</div>

<div id="menu-acciones">
    <div class="opt-accion" style="background:#4CAF50; color:white;" onclick="registrarAccion('GOL')">GOL ⚽</div>
    <div class="opt-accion" style="background:#FF9800; color:white;" onclick="registrarAccion('FALTA')">FALTA ⚠️</div>
    <div class="opt-accion" style="background:#2196F3; color:white;" onclick="registrarAccion('TIRO')">TIRO 🎯</div>
    <div class="opt-accion" style="background:#00BCD4; color:white;" onclick="registrarAccion('ASISTENCIA')">ASISTENCIA 👟</div>
    <div class="opt-accion" style="background:#FFEB3B; color:#000;" onclick="registrarAccion('AMARILLA')">AMARILLA 🟨</div>
    <div class="opt-accion" style="background:#F44336; color:white;" onclick="registrarAccion('ROJA')">ROJA 🟥</div>
</div>

<script>
    let corriendo = false, tiempo = 1200, modoActual = 'movimiento', arrastrando = false;	
    let eqL = [], eqV = [], jugadorActivo = null;
    let golesL = 0, golesV = 0, faltasL_P1 = 0, faltasV_P1 = 0, faltasL_P2 = 0, faltasV_P2 = 0, parteActual = 1;
    let historialTiemposMuertos = [];
    let wakeLock = null;
	
    document.addEventListener('contextmenu', event => event.preventDefault());

    async function activarKeepAwake() {
        if ('wakeLock' in navigator) {
            try {
                if (!wakeLock) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                }
            } catch (err) { console.log("WakeLock no disponible"); }
        }
        const video = document.getElementById('keep-awake-video');
        if (video && video.paused) {
            video.play().catch(() => {});
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            activarKeepAwake();
        }
    });

    let posicionesPista = [
        { id:'PL1', x:12, y:50, local:true, portero:true, asignado:null },
        { id:'PL2', x:30, y:30, local:true, portero:false, asignado:null },
        { id:'PL3', x:30, y:70, local:true, portero:false, asignado:null },
        { id:'PL4', x:45, y:20, local:true, portero:false, asignado:null },
        { id:'PL5', x:45, y:80, local:true, portero:false, asignado:null },
        { id:'PV1', x:88, y:50, local:false, portero:true, asignado:null },
        { id:'PV2', x:70, y:30, local:false, portero:false, asignado:null },
        { id:'PV3', x:70, y:70, local:false, portero:false, asignado:null },
        { id:'PV4', x:55, y:20, local:false, portero:false, asignado:null },
        { id:'PV5', x:55, y:80, local:false, portero:false, asignado:null }
    ];

    function volverAConfig() {
        document.getElementById('interfaz-partido').style.display = 'none';
        document.getElementById('pantalla-config').style.display = 'flex';
    }

    function registrarMemoria(tipo, valor, equipoRelacionado = null) {
        if(!valor || valor.trim() === "") return;
        let mem = JSON.parse(localStorage.getItem('futsal_memoria')) || { temporadas:[], equipos:[], mapeo:{} };
        if(tipo === 'temporada' && !mem.temporadas.includes(valor)) mem.temporadas.push(valor);
        if(tipo === 'equipo' && !mem.equipos.includes(valor)) mem.equipos.push(valor);
        if(tipo === 'jugador' && equipoRelacionado) {
            if(!mem.mapeo[equipoRelacionado]) mem.mapeo[equipoRelacionado] = [];
            if(!mem.mapeo[equipoRelacionado].includes(valor)) mem.mapeo[equipoRelacionado].push(valor);
        }
        localStorage.setItem('futsal_memoria', JSON.stringify(mem));
        actualizarTodosLosDatalists();
    }

    function actualizarTodosLosDatalists() {
        const mem = JSON.parse(localStorage.getItem('futsal_memoria')) || { temporadas:[], equipos:[], mapeo:{} };
        document.getElementById('list-temporadas').innerHTML = mem.temporadas.map(v => `<option value="${v}">`).join('');
        document.getElementById('list-equipos').innerHTML = mem.equipos.map(v => `<option value="${v}">`).join('');
    }

    function actualizarDatalistJugadores(lado) {
        const mem = JSON.parse(localStorage.getItem('futsal_memoria')) || { temporadas:[], equipos:[], mapeo:{} };
        const nombreEquipo = document.getElementById(`nombre-${lado}`).value;
        const dl = document.getElementById(`list-jugadores-${lado}`);
        const yaEscritos = [];
        for(let i=1; i<=14; i++) {
            const val = document.getElementById(`${lado==='local'?'l':'r'}nom-${i}`).value;
            if(val) yaEscritos.push(val.trim());
        }
        let opciones = [];
        if(nombreEquipo && mem.mapeo[nombreEquipo]) {
            opciones = mem.mapeo[nombreEquipo].filter(j => !yaEscritos.includes(j.trim()));
        }
        dl.innerHTML = opciones.map(v => `<option value="${v}">`).join('');
    }

    function iniciarPartido() {
        const nL = document.getElementById('nombre-local').value;
        const nR = document.getElementById('nombre-rival').value;
        const temp = document.getElementById('temporada-act').value;
        registrarMemoria('temporada', temp);
        registrarMemoria('equipo', nL);
        registrarMemoria('equipo', nR);

        eqL = []; eqV = [];
        for(let i=1; i<=14; i++) {
            let numL = document.getElementById(`lnum-${i}`).value, nomL = document.getElementById(`lnom-${i}`).value;
            let numR = document.getElementById(`rnum-${i}`).value, nomR = document.getElementById(`rnom-${i}`).value;
            if(nomL) eqL.push({num:numL, nombre:nomL, local:true, enPista:false, stats:{GOL:[],FALTA_P1:[],FALTA_P2:[],TIRO:[],ASISTENCIA:[],AMARILLA:[],ROJA:[],tiempoSeg:0}});
            if(nomR) eqV.push({num:numR, nombre:nomR, local:false, enPista:false, stats:{GOL:[],FALTA_P1:[],FALTA_P2:[],TIRO:[],ASISTENCIA:[],AMARILLA:[],ROJA:[],tiempoSeg:0}});
        }
        document.getElementById('pantalla-config').style.display = 'none';
        document.getElementById('interfaz-partido').style.display = 'flex';
        document.getElementById('d-l-cont').innerText = nL || "LOCAL";
        document.getElementById('d-v-cont').innerText = nR || "RIVAL";
        render();
    }

    function render(){
        const capa = document.getElementById('capa-jugadores'); capa.innerHTML = '';
        const bL = document.getElementById('banquillo-local'); bL.innerHTML = '';
        const bV = document.getElementById('banquillo-rival'); bV.innerHTML = '';

        posicionesPista.forEach(pos => {
            const d = document.createElement('div');
            d.className = 'jugador';
            
            if(jugadorActivo === pos) d.style.border = "4px solid var(--led-verde)";
            else d.style.border = "2px solid #fff";
            
            d.style.left = pos.x + "%"; d.style.top = pos.y + "%";
            d.style.backgroundColor = pos.portero ? 'var(--portero-color)' : (pos.local ? '#FFD600' : '#D50000');
            d.style.color = pos.local ? '#000' : '#fff';
            d.innerHTML = pos.asignado ? pos.asignado.num : "";
            
            if(pos.asignado) {
                const sn = document.createElement('span'); 
                sn.className = 'nombre-jugador-pista';
                sn.innerText = pos.asignado.nombre; d.appendChild(sn);
            }
            
            let iX, iY, mov = false;

            d.onpointerdown = (e) => {
                e.stopPropagation();
                iX = e.clientX; iY = e.clientY;
                mov = false; arrastrando = true;
                jugadorActivo = pos;
                render(); 
            };

            d.onpointermove = (e) => {
                if (!arrastrando || jugadorActivo !== pos) return;
                if (Math.abs(e.clientX - iX) > 15 || Math.abs(e.clientY - iY) > 15) {
                    mov = true;
                    const r = document.getElementById('pista').getBoundingClientRect();
                    pos.x = Math.max(2, Math.min(98, ((e.clientX - r.left) / r.width) * 100));
                    pos.y = Math.max(4, Math.min(96, ((e.clientY - r.top) / r.height) * 100));
                    d.style.left = pos.x + "%"; d.style.top = pos.y + "%";
                }
            };

            d.onpointerup = (e) => {
                if (!arrastrando) return;
                arrastrando = false;
                if (!mov) {
                    if (modoActual === 'acciones' && pos.asignado) abrirMenuAcciones(e.clientX, e.clientY);
                    else if (modoActual === 'stats' && pos.asignado) mostrarEstadisticaJugador(pos.asignado);
                }
                render(); 
            };
            capa.appendChild(d);
        });

        [...eqL, ...eqV].forEach(j => {
            if(!j.enPista) {
                const s = document.createElement('div');
                s.className = 'jugador-item-banquillo';
                s.style.cssText = `padding:12px; background:#222; margin-bottom:5px; border-radius:8px; cursor:pointer; font-size:0.85rem; border-left:5px solid ${j.local?'#FFD600':'#D50000'}`;
                s.innerText = `${j.num}.${j.nombre}`;
                s.onclick = () => {
                    if(jugadorActivo && jugadorActivo.local === j.local) {
                        if(jugadorActivo.asignado) jugadorActivo.asignado.enPista = false;
                        jugadorActivo.asignado = j; j.enPista = true; jugadorActivo = null;
                        render();
                    }
                };
                (j.local ? bL : bV).appendChild(s);
            }
        });
        actualizarUIBotones();
    }

    function actualizarUIBotones() {
        const btnAcciones = document.getElementById('btn-acciones');
        if (modoActual === 'acciones') {
            btnAcciones.style.border = "4px solid #FFFFFF";
            btnAcciones.style.boxShadow = "0 0 10px #FFFFFF";
        } else {
            btnAcciones.style.border = "none";
            btnAcciones.style.boxShadow = "none";
        }
        document.getElementById('btn-timeout').style.border = (modoActual === 'timeout') ? "4px solid #FFEB3B" : "none";
        document.getElementById('btn-stats').style.border = (modoActual === 'stats') ? "4px solid #FFEB3B" : "none";
        const btnPlay = document.getElementById('btn-play');
        if (btnPlay) btnPlay.style.border = corriendo ? "4px solid #FFEB3B" : "none";
    }

    function deseleccionarJugador() { jugadorActivo = null; render(); }
    
    function toggleModo(m) { 
        if(m === 'timeout' && modoActual !== 'timeout') pararJuego();
        else if (m === 'timeout' && modoActual === 'timeout') iniciarJuego();
        modoActual = (modoActual === m) ? 'movimiento' : m; 
        render(); 
    }

    function manejadorClickCabecera(lado) {
        if(modoActual === 'timeout') registrarTiempoMuerto(lado);
        if(modoActual === 'stats') { mostrarEstadisticaEquipo(lado); }
    }

    function registrarTiempoMuerto(lado) {
        let m = Math.floor(tiempo / 60), s = tiempo % 60;
        let tiempoTexto = `${m}:${s < 10 ? '0' + s : s}`;
        let nombreEq = document.getElementById(lado === 'LOCAL' ? 'nombre-local' : 'nombre-rival').value || lado;
        historialTiemposMuertos.push({ equipo: nombreEq, tiempo: tiempoTexto, parte: parteActual });
    }

    function formatoSegundos(totalSegundos) {
        let min = Math.floor(totalSegundos / 60);
        let seg = totalSegundos % 60;
        return `${min}:${seg < 10 ? '0' + seg : seg}`;
    }

    function mostrarEstadisticaEquipo(lado) {
        const modal = document.getElementById('modal-stats');
        const cont = document.getElementById('contenido-stats');
        const eq = (lado === 'LOCAL') ? eqL : eqV;
        const nombreEq = document.getElementById(lado === 'LOCAL' ? 'nombre-local' : 'nombre-rival').value || lado;
        let html = `<h2 style="color:var(--led-verde)">EQUIPO: ${nombreEq}</h2>`;
        html += generarTabla(eq);
        let tmuertos = historialTiemposMuertos.filter(t => t.equipo === nombreEq);
        if(tmuertos.length > 0) {
            html += `<h3>TIEMPOS MUERTOS</h3><ul>`;
            tmuertos.forEach(t => html += `<li>Parte ${t.parte} - Minuto ${t.tiempo}</li>`);
            html += `</ul>`;
        }
        cont.innerHTML = html;
        modal.style.display = 'flex';
        modal.style.pointerEvents = 'auto';
    }

    function mostrarEstadisticaJugador(j) {
        const modal = document.getElementById('modal-stats');
        const cont = document.getElementById('contenido-stats');
        const getDetalle = (arr) => {
            if(!arr || arr.length === 0) return "0";
            return `${arr.length} <small style="display:block; font-size:0.6rem; color:#aaa">(${arr.join(', ')})</small>`;
        };
        let fTotal = [...(j.stats.FALTA_P1 || []), ...(j.stats.FALTA_P2 || [])];
        let html = `<h2 style="color:var(--led-verde)">${j.num}. ${j.nombre}</h2>`;
        html += `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:1.1rem;">
                    <div style="background:#222; padding:10px; border-radius:5px;">⚽ GOLES: ${getDetalle(j.stats.GOL)}</div>
                    <div style="background:#222; padding:10px; border-radius:5px;">⚠️ FALTAS: ${fTotal.length} <small style="display:block; font-size:0.6rem; color:#aaa">(${fTotal.join(', ')})</small></div>
                    <div style="background:#222; padding:10px; border-radius:5px;">🎯 TIROS: ${getDetalle(j.stats.TIRO)}</div>
                    <div style="background:#222; padding:10px; border-radius:5px;">👟 ASIST: ${getDetalle(j.stats.ASISTENCIA)}</div>
                    <div style="background:#222; padding:10px; border-radius:5px;">🟨 AMARILLA: ${getDetalle(j.stats.AMARILLA)}</div>
                    <div style="background:#222; padding:10px; border-radius:5px;">🟥 ROJA: ${getDetalle(j.stats.ROJA)}</div>
                    <div style="background:#222; padding:10px; border-radius:5px; grid-column:span 2; text-align:center;">⏱️ TIEMPO JUGADO: ${formatoSegundos(j.stats.tiempoSeg)}</div>
                 </div>`;
        cont.innerHTML = html;
        modal.style.display = 'flex';
        modal.style.pointerEvents = 'auto';
    }

    function generarTabla(equipo) {
        const getCompacto = (arr) => {
            if(!arr || arr.length === 0) return "0";
            return `${arr.length} <span style="font-size:0.6rem; color:#aaa; display:block">(${arr.join(',')})</span>`;
        };
        let h = `<table class="tabla-stats"><tr><th>#</th><th>Jugador</th><th>G</th><th>F</th><th>T</th><th>A</th><th>🟨</th><th>🟥</th><th>Tiempo Jugado</th></tr>`;
        equipo.forEach(j => {
            let fTotal = [...(j.stats.FALTA_P1 || []), ...(j.stats.FALTA_P2 || [])];
            h += `<tr><td>${j.num}</td><td>${j.nombre}</td><td>${getCompacto(j.stats.GOL)}</td><td>${fTotal.length} <span style="font-size:0.6rem; color:#aaa; display:block">(${fTotal.join(',')})</span></td><td>${getCompacto(j.stats.TIRO)}</td><td>${getCompacto(j.stats.ASISTENCIA)}</td><td>${getCompacto(j.stats.AMARILLA)}</td><td>${getCompacto(j.stats.ROJA)}</td><td>${formatoSegundos(j.stats.tiempoSeg)}</td></tr>`;
        });
        return h + `</table>`;
    }

    function abrirMenuAcciones(x, y) {
        const menu = document.getElementById('menu-acciones');
        menu.style.display = 'block';
        menu.style.pointerEvents = 'auto';
        menu.style.left = Math.min(x, window.innerWidth - 180) + "px";
        menu.style.top = Math.min(y, window.innerHeight - 350) + "px";
    }

    function cerrarMenuAcciones() { 
        const menu = document.getElementById('menu-acciones');
        menu.style.display = 'none';
        menu.style.pointerEvents = 'none';
    }

    function registrarAccion(tipo) {
        if(!jugadorActivo || !jugadorActivo.asignado) return;
        let j = jugadorActivo.asignado;
        let m = Math.floor(tiempo / 60), s = tiempo % 60;
        let minAccion = `${m}:${s < 10 ? '0' + s : s}`;
        if(tipo==='GOL') {
            j.stats.GOL.push(minAccion);
            if(j.local) { golesL++; document.getElementById('g-l').innerText = golesL; }
            else { golesV++; document.getElementById('g-v').innerText = golesV; }
        } else if(tipo==='FALTA') {
            j.stats[`FALTA_P${parteActual}`].push(minAccion);
            if(j.local) { let f = (parteActual===1 ? ++faltasL_P1 : ++faltasL_P2); document.getElementById('f-l').innerText = "F: " + f; }
            else { let f = (parteActual===1 ? ++faltasV_P1 : ++faltasV_P2); document.getElementById('f-v').innerText = "F: " + f; }
        } else { j.stats[tipo].push(minAccion); }
        cerrarMenuAcciones(); render();
    }

    function tick(){ if(corriendo && tiempo > 0) { tiempo--; actualizarCrono(); posicionesPista.forEach(p=>{if(p.asignado) p.asignado.stats.tiempoSeg++}); } }
    setInterval(tick, 1000);
    function iniciarJuego(){ activarKeepAwake(); corriendo = true; render(); }
    function pararJuego(){ corriendo = false; render(); }
    function actualizarCrono(){ let m=Math.floor(tiempo/60), s=tiempo%60; document.getElementById('cronometro').innerText=`${m}:${s<10?'0'+s:s}`; }
    function permutarCampo() { posicionesPista.forEach(p => p.x = 100 - p.x); render(); }
    
    function toggleFullScreen() { 
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    function alternarParte() { 
        parteActual = (parteActual===1)?2:1; document.getElementById('label-parte').innerText = parteActual + "ª PARTE";
        tiempo = 1200; actualizarCrono(); permutarCampo(); 
    }

    function guardarSesion() {
        const jL = [], jV = [];
        for(let i=1; i<=14; i++) {
            jL.push({ num: document.getElementById(`lnum-${i}`).value, nom: document.getElementById(`lnom-${i}`).value });
            jV.push({ num: document.getElementById(`rnum-${i}`).value, nom: document.getElementById(`rnom-${i}`).value });
        }
        const data = {
            nL: document.getElementById('nombre-local').value,
            nR: document.getElementById('nombre-rival').value,
            temp: document.getElementById('temporada-act').value,
            jL: jL, jV: jV,
            posPista: posicionesPista.map(p => ({id: p.id, x: p.x, y: p.y}))
        };
        localStorage.setItem('futsal_ultima_sesion', JSON.stringify(data));
        actualizarTodosLosDatalists();
    }

    function cargarInputsConfig() {
        const iL = document.getElementById('inputs-local'), iV = document.getElementById('inputs-rival');
        iL.innerHTML = ''; iV.innerHTML = '';
        for(let i=1; i<=14; i++) {
            iL.innerHTML += `<div class="fila-input-jugador"><input type="text" id="lnum-${i}" class="input-num" value="${i}" onchange="guardarSesion()"><input type="text" id="lnom-${i}" list="list-jugadores-local" class="input-nom" placeholder="J${i}" onmousedown="this.value=''; actualizarDatalistJugadores('local')" onchange="guardarSesion()"></div>`;
            iV.innerHTML += `<div class="fila-input-jugador"><input type="text" id="rnum-${i}" class="input-num" value="${i}" onchange="guardarSesion()"><input type="text" id="rnom-${i}" list="list-jugadores-rival" class="input-nom" placeholder="J${i}" onmousedown="this.value=''; actualizarDatalistJugadores('rival')" onchange="guardarSesion()"></div>`;
        }
        actualizarTodosLosDatalists();
        const u = JSON.parse(localStorage.getItem('futsal_ultima_sesion'));
        if(u) {
            document.getElementById('nombre-local').value = u.nL || "";
            document.getElementById('nombre-rival').value = u.nR || "";
            document.getElementById('temporada-act').value = u.temp || "";
            if(u.jL) u.jL.forEach((j, i) => { if(i<14){ document.getElementById(`lnum-${i+1}`).value = j.num; document.getElementById(`lnom-${i+1}`).value = j.nom; }});
            if(u.jV) u.jV.forEach((j, i) => { if(i<14){ document.getElementById(`rnum-${i+1}`).value = j.num; document.getElementById(`rnom-${i+1}`).value = j.nom; }});
            if(u.posPista) u.posPista.forEach(s => { const p = posicionesPista.find(x => x.id === s.id); if(p){ p.x = s.x; p.y = s.y; }});
        }
    }

    function borrarTodo() { if(confirm("¿Borrar historial?")) { localStorage.clear(); location.reload(); } }
    
    function exportarEstadisticas() { 
        let nomL = document.getElementById('nombre-local').value || "LOCAL", nomV = document.getElementById('nombre-rival').value || "RIVAL", temp = document.getElementById('temporada-act').value || "S/N";
        let txt = `--- RESUMEN DEL PARTIDO ---\nTEMPORADA: ${temp}\nMARCADOR: ${nomL} ${golesL} - ${golesV} ${nomV}\n------------------------------------------\n`;
        const procesarEq = (nombre, lista) => {
            let res = `ESTADÍSTICAS ${nombre.toUpperCase()}\n------------------------------------------\n`;
            lista.forEach(j => {
                let f = [...(j.stats.FALTA_P1 || []), ...(j.stats.FALTA_P2 || [])];
                if(j.stats.tiempoSeg > 0 || j.stats.GOL.length > 0) {
                    res += `[${j.num}] ${j.nombre}\n - Tiempo: ${formatoSegundos(j.stats.tiempoSeg)}\n`;
                    if(j.stats.GOL.length > 0) res += ` - Goles: ${j.stats.GOL.length} (${j.stats.GOL.join(', ')})\n`;
                    if(f.length > 0) res += ` - Faltas: ${f.length} (${f.join(', ')})\n`;
                }
            });
            return res + "\n";
        };
        txt += procesarEq(nomL, eqL) + procesarEq(nomV, eqV);
        navigator.clipboard.writeText(txt).then(() => alert("Copiado!")).catch(() => alert("Error al copiar"));
    }

    cargarInputsConfig();
    render();
</script>
</body>
</html>
