<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, touch-action=manipulation">
    <title>Futsal Pro - v21.0</title>
    <style>
        :root { 
            --pista-azul: #0D47A1; --linea: #FFFFFF; --led-verde: #00E676;
            --led-rojo: #FF1744; --led-azul-tiempo: #0026e6;
            --area-color: rgba(255, 255, 255, 0.1);
            --portero-color: #C0C0C0;
            --linea-porteria: #FF1744;
            --accent: #9C27B0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #000; color: white; 
            height: 100svh; width: 100vw; overflow: hidden; 
            position: fixed; overscroll-behavior: none;
            touch-action: none;
        }

        .controles-navegacion {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10000;
        }

        .btn-header-top {
            width: 50px;
            height: 50px;
            background: #222;
            border: 2px solid #444;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        #pantalla-config {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .contenedor-plantillas {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-bottom: 15px;
        }

        .cuadro-equipo {
            flex: 1;
            background: #161616;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #333;
        }

        .fila-input-jugador {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .input-num {
            width: 35px;
            background: #333;
            border: 1px solid #555;
            color: var(--led-verde);
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
        }

        .input-nom {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .check-conv {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        #interfaz-partido {
            display: none;
            flex-direction: column;
            height: 100svh;
            width: 100vw;
        }

        #contenedor-cabecera-global {
            height: 115px;
            width: 100%;
            display: flex;
            background: #000;
            border-bottom: 3px solid #333;
            flex-shrink: 0;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            padding-right: 130px;
        }

        #cabecera-marcador {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 10px;
            padding: 2px 0;
        }

        .bloque-goles {
            min-width: 95px;
            height: 90%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .bg-goles-local { background: #FFD600; color: #000; }
        .bg-goles-rival { background: #D50000; color: #fff; }

        .goles-txt {
            font-size: 4.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            line-height: 0.8;
        }

        .contenedor-nombre {
            flex: 2;
            text-align: center;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .nombre-completo {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .bg-tiempo {
            background: var(--led-azul-tiempo);
            border: 3px solid #fff;
            flex: 1.5;
            height: 90%;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 220px;
        }

        #cronometro {
            font-size: 5rem;
            font-family: 'Courier New', monospace;
            color: var(--led-verde);
            font-weight: bold;
            line-height: 0.8;
        }

        .cuerpo-app {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            background: #111;
            position: relative;
        }

        .col-banquillo {
            width: 180px;
            background: #0a0a0a;
            padding: 5px;
            overflow-y: auto;
            border: 1px solid #222;
            flex-shrink: 0;
            touch-action: none;
        }

        .seccion-pista {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            overflow: hidden;
        }

        .campo {
            position: relative;
            height: 95%;
            aspect-ratio: 2 / 1;
            background: var(--pista-azul);
            border: 3px solid var(--linea);
            touch-action: none;
        }

        #capa-jugadores {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        .jugador {
            position: absolute;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #fff;
            z-index: 110;
            transform: translate(-50%, -50%);
            touch-action: none;
            pointer-events: auto;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nombre-jugador-pista {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.75rem;
            color: #fff;
            background: rgba(0,0,0,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            pointer-events: none;
            text-transform: uppercase;
            border: 1px solid #444;
        }

        /* CAPA DE ZONAS - CORRECCIÓN PARA TABLET */
        #capa-zonas-tacticas {
            position: absolute;
            inset: 0;
            z-index: 5000;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(2, 1fr);
            background: rgba(0,0,0,0.3);
            pointer-events: auto;
        }
        .celda-zona {
            border: 1px dashed rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-weight: bold;
            font-size: 2rem;
            cursor: pointer;
            pointer-events: auto;
        }
        .celda-zona:active { background: rgba(0,230,118,0.5); }

        /* MINI MAPA EN ESTADÍSTICAS */
        .contenedor-mini-mapa {
            width: 100%;
            max-width: 450px;
            margin: 10px auto;
            aspect-ratio: 2 / 1;
            background: var(--pista-azul);
            border: 2px solid white;
            position: relative;
            border-radius: 5px;
            overflow: hidden;
        }
        .punto-mapa {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid white;
            transform: translate(-50%, -50%);
        }

        .controles {
            height: 85px;
            padding: 8px 5px;
            display: flex;
            gap: 4px;
            background: #000;
            border-top: 3px solid #444;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-footer {
            height: 100%;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 0.65rem;
            flex: 1;
            text-transform: uppercase;
            cursor: pointer;
        }

        #menu-acciones {
            position: fixed;
            display: none;
            background: #1a1a1a;
            border: 3px solid #666;
            border-radius: 15px;
            z-index: 20000;
            width: 220px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            overflow: hidden;
            touch-action: none;
        }

        .opt-accion {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            border-bottom: 2px solid #333;
            font-size: 1.1rem;
            text-transform: uppercase;
            width: 100%;
        }

        #modal-stats {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 21000;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .tabla-stats {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            color: white;
            font-size: 0.9rem;
        }

        .tabla-stats th { background: #333; color: var(--led-verde); padding: 12px 5px; border: 1px solid #444; text-transform: uppercase; }
        .tabla-stats td { padding: 12px 5px; border: 1px solid #444; text-align: center; }
        .tabla-stats tr:nth-child(even) { background: #1a1a1a; }

        .linea-medio { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--linea); }
        .circulo-central { position: absolute; left: 50%; top: 50%; width: 15%; aspect-ratio: 1/1; border: 2px solid var(--linea); border-radius: 50%; transform: translate(-50%, -50%); }
        .area-6m { position: absolute; top: 15%; height: 70%; width: 15%; border: 2px solid var(--linea); background: var(--area-color); }
        .area-izq { left: 0; border-radius: 0 100% 100% 0 / 0 50% 50% 0; border-left:none; }
        .area-der { right: 0; border-radius: 100% 0 0 100% / 50% 0 0 50%; border-right:none; }
    </style>
</head>
<body onclick="activarKeepAwake()">

<div class="controles-navegacion">
    <button onclick="window.location.href='index.html'" class="btn-header-top">🏠</button>
    <button onclick="toggleFullScreen()" class="btn-header-top">⛶</button>
</div>

<div id="pantalla-config">
    <h2 style="color:var(--led-verde)">CONFIGURACIÓN FUTSAL</h2>
    
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input type="text" id="temporada-act" placeholder="TEMPORADA" style="flex:2; padding:15px; border-radius:8px; border:2px solid #333; background:#222; color:white; font-weight:bold;">
        <input type="text" id="jornada-act" placeholder="JORNADA" style="flex:1; padding:15px; border-radius:8px; border:2px solid #333; background:#222; color:white;">
        <input type="date" id="fecha-act" style="flex:1.5; padding:15px; border-radius:8px; border:2px solid #333; background:#222; color:white;">
    </div>

    <div class="contenedor-plantillas">
        <div class="cuadro-equipo">
            <input type="text" id="nombre-local" onblur="cargarPlantillaDesdeMemoria('local')" placeholder="LOCAL" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none; background:#ffd600; color:black; font-weight:bold; width:100%">
            <div id="inputs-local"></div>
        </div>
        <div class="cuadro-equipo">
            <input type="text" id="nombre-rival" onblur="cargarPlantillaDesdeMemoria('rival')" placeholder="RIVAL" style="padding:10px; margin-bottom:10px; border-radius:5px; border:none; background:#d50000; color:white; font-weight:bold; width:100%">
            <div id="inputs-rival"></div>
        </div>
    </div>

    <button onclick="iniciarPartido()" style="background:#4CAF50; color:white; padding:20px; font-size:1.5rem; border:none; border-radius:12px; font-weight:bold; margin-bottom:10px; cursor:pointer;">EMPEZAR PARTIDO</button>
    <button onclick="limpiarTodo()" style="background:#444; color:white; padding:10px; border:none; border-radius:8px; cursor:pointer;">BORRAR DATOS APP</button>
</div>

<div id="interfaz-partido">
    <div id="contenedor-cabecera-global">
        <button onclick="volverAConfig()" class="btn-header-top">←</button>
        
        <div id="cabecera-marcador">
            <div class="bloque-goles bg-goles-local">
                <div id="g-l" class="goles-txt">0</div>
                <div id="f-l" style="font-size:1rem; font-weight:bold">F: 0</div>
            </div>

            <div class="contenedor-nombre" onclick="manejadorClickCabecera('LOCAL')">
                <div id="d-l-cont" class="nombre-completo" style="color:#FFD600">LOCAL</div>
            </div>

            <div class="bg-tiempo">
                <div id="label-parte" style="font-size:1.1rem; color:#fff; font-weight:bold;">1ª PARTE</div>
                <div id="cronometro">20:00</div>
            </div>

            <div class="contenedor-nombre" onclick="manejadorClickCabecera('RIVAL')">
                <div id="d-v-cont" class="nombre-completo" style="color:#D50000">RIVAL</div>
            </div>

            <div class="bloque-goles bg-goles-rival">
                <div id="g-v" class="goles-txt">0</div>
                <div id="f-v" style="font-size:1rem; font-weight:bold">F: 0</div>
            </div>
        </div>
    </div>

    <div class="cuerpo-app">
        <div class="col-banquillo" id="banquillo-local"></div>
        <div class="seccion-pista">
            <div class="campo" id="pista" onpointerdown="cerrarMenuAcciones();">
                <div class="linea-medio"></div><div class="circulo-central"></div>
                <div class="area-6m area-izq"></div><div class="area-6m area-der"></div>
                <div id="capa-jugadores"></div>
                
                <div id="capa-zonas-tacticas">
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(1)">1</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(2)">2</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(3)">3</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(4)">4</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(5)">5</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(6)">6</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(7)">7</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(8)">8</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(9)">9</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(10)">10</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(11)">11</div>
                    <div class="celda-zona" onpointerdown="registrarZonaYFinalizar(12)">12</div>
                </div>
            </div>
        </div>
        <div class="col-banquillo" id="banquillo-rival"></div>
    </div>

    <div class="controles">
        <button class="btn-footer" style="background:#333" onclick="permutarCampo()">⇄ PISTA</button>
        <button class="btn-footer" id="btn-stop" style="background:var(--led-rojo)" onclick="pararJuego()">STOP</button>
        <button class="btn-footer" id="btn-play" style="background:#2e7d32" onclick="iniciarJuego()">PLAY</button>
        <button class="btn-footer" id="btn-acciones" style="background:#673AB7" onclick="toggleModo('acciones')">ACCIONES</button>
        <button class="btn-footer" id="btn-timeout" style="background:#FF5722" onclick="toggleModo('timeout')">T. MUERTO</button>
        <button class="btn-footer" style="background:#E91E63" onclick="alternarParte()">PARTE</button>
        <button class="btn-footer" id="btn-stats" style="background:#009688" onclick="toggleModo('stats')">ESTADISTICAS</button>
        <button class="btn-footer" style="background:#795548" onclick="exportarEstadisticas()">EXP</button>
    </div>
</div>

<div id="menu-acciones">
    <div class="opt-accion" style="background:#4CAF50; color:white;" onpointerdown="prepararAccion('GOL')">GOL ⚽</div>
    <div class="opt-accion" style="background:#FF9800; color:white;" onpointerdown="prepararAccion('FALTA')">FALTA ⚠️</div>
    <div class="opt-accion" style="background:#2196F3; color:white;" onpointerdown="prepararAccion('TIRO')">TIRO 🎯</div>
    <div class="opt-accion" style="background:#00BCD4; color:white;" onpointerdown="prepararAccion('ASISTENCIA')">ASISTENCIA 👟</div>
    <div class="opt-accion" style="background:#FFEB3B; color:#000;" onpointerdown="prepararAccion('AMARILLA')">AMARILLA 🟨</div>
    <div class="opt-accion" style="background:#F44336; color:white;" onpointerdown="prepararAccion('ROJA')">ROJA 🟥</div>
    <div class="opt-accion" style="background:#444; color:white;" onpointerdown="cerrarMenuAcciones()">CANCELAR ×</div>
</div>

<div id="modal-stats">
    <div id="contenido-stats"></div>
    <button onclick="document.getElementById('modal-stats').style.display='none';" style="width:100%; padding:20px; background:var(--led-rojo); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; font-size:1.2rem;">CERRAR</button>
</div>

<script>
    let corriendo = false;
    let tiempo = 1200;
    let modoActual = 'movimiento';
    let arrastrando = false;
    
    let eqL = [];
    let eqV = [];
    let jugadorActivo = null;
    let accionPendiente = null;

    let golesL = 0, golesV = 0;
    let faltasL_P1 = 0, faltasV_P1 = 0;
    let faltasL_P2 = 0, faltasV_P2 = 0;
    let parteActual = 1;

    let historialTiemposMuertos = [];
    let tiempoEstabaCorriendoAntesDeTM = false;

    // Coordenadas fijas para pintar los puntos en el mini-mapa basado en la ID de zona (1-12)
    const centroZonas = {
        1:[8.3, 25], 2:[25, 25], 3:[41.6, 25], 4:[58.3, 25], 5:[75, 25], 6:[91.6, 25],
        7:[8.3, 75], 8:[25, 75], 9:[41.6, 75], 10:[58.3, 75], 11:[75, 75], 12:[91.6, 75]
    };
    const coloresAcciones = { GOL: '#00E676', FALTA: '#FF9800', TIRO: '#2196F3', ASISTENCIA: '#00BCD4', AMARILLA: '#FFEB3B', ROJA: '#F44336' };

    function guardarTodo() {
        const datos = {
            temporada: document.getElementById('temporada-act').value,
            jornada: document.getElementById('jornada-act').value,
            fecha: document.getElementById('fecha-act').value,
            nomL: document.getElementById('nombre-local').value,
            nomV: document.getElementById('nombre-rival').value,
            eqL, eqV, golesL, golesV,
            faltasL_P1, faltasV_P1, faltasL_P2, faltasV_P2,
            tiempo, parteActual, historialTiemposMuertos
        };
        localStorage.setItem('futsal_master_data', JSON.stringify(datos));
        if(datos.nomL) registrarPlantilla(datos.nomL, eqL);
        if(datos.nomV) registrarPlantilla(datos.nomV, eqV);
    }

    function registrarPlantilla(nombre, lista) {
        let registro = JSON.parse(localStorage.getItem('futsal_registro_equipos') || "{}");
        registro[nombre] = lista.map(j => ({num: j.num, nombre: j.nombre}));
        localStorage.setItem('futsal_registro_equipos', JSON.stringify(registro));
    }

    function cargarPlantillaDesdeMemoria(lado) {
        const nombre = document.getElementById(lado === 'local' ? 'nombre-local' : 'nombre-rival').value;
        const registro = JSON.parse(localStorage.getItem('futsal_registro_equipos') || "{}");
        if(registro[nombre]) {
            registro[nombre].forEach((j, i) => {
                if(i < 20) {
                    document.getElementById(`${lado[0]}num-${i+1}`).value = j.num;
                    document.getElementById(`${lado[0]}nom-${i+1}`).value = j.nombre;
                }
            });
        }
    }

    function recuperarSesion() {
        const d = JSON.parse(localStorage.getItem('futsal_master_data'));
        if(!d) return;
        document.getElementById('temporada-act').value = d.temporada || "";
        document.getElementById('jornada-act').value = d.jornada || "";
        document.getElementById('fecha-act').value = d.fecha || "";
        document.getElementById('nombre-local').value = d.nomL || "";
        document.getElementById('nombre-rival').value = d.nomV || "";
        if(d.eqL) d.eqL.forEach((j, i) => { if(i<20){ document.getElementById(`lnum-${i+1}`).value=j.num; document.getElementById(`lnom-${i+1}`).value=j.nombre; } });
        if(d.eqV) d.eqV.forEach((j, i) => { if(i<20){ document.getElementById(`rnum-${i+1}`).value=j.num; document.getElementById(`rnom-${i+1}`).value=j.nombre; } });
    }

    let posicionesPista = [
        { id:'PL1', x:12, y:50, local:true, portero:true, asignado:null },
        { id:'PL2', x:30, y:30, local:true, portero:false, asignado:null },
        { id:'PL3', x:30, y:70, local:true, portero:false, asignado:null },
        { id:'PL4', x:45, y:20, local:true, portero:false, asignado:null },
        { id:'PL5', x:45, y:80, local:true, portero:false, asignado:null },
        { id:'PV1', x:88, y:50, local:false, portero:true, asignado:null },
        { id:'PV2', x:70, y:30, local:false, portero:false, asignado:null },
        { id:'PV3', x:70, y:70, local:false, portero:false, asignado:null },
        { id:'PV4', x:55, y:20, local:false, portero:false, asignado:null },
        { id:'PV5', x:55, y:80, local:false, portero:false, asignado:null }
    ];

    function iniciarPartido() {
        eqL = []; eqV = [];
        for(let i=1; i<=20; i++) {
            let nL = document.getElementById(`lnum-${i}`).value, nmL = document.getElementById(`lnom-${i}`).value, cL = document.getElementById(`lconv-${i}`).checked;
            let nR = document.getElementById(`rnum-${i}`).value, nmR = document.getElementById(`rnom-${i}`).value, cR = document.getElementById(`rconv-${i}`).checked;
            if(nmL) eqL.push({num:nL, nombre:nmL, convocado:cL, local:true, enPista:false, stats:{GOL:[],FALTA_P1:[],FALTA_P2:[],TIRO:[],ASISTENCIA:[],AMARILLA:[],ROJA:[],tiempoSeg:0}});
            if(nmR) eqV.push({num:nR, nombre:nmR, convocado:cR, local:false, enPista:false, stats:{GOL:[],FALTA_P1:[],FALTA_P2:[],TIRO:[],ASISTENCIA:[],AMARILLA:[],ROJA:[],tiempoSeg:0}});
        }
        document.getElementById('pantalla-config').style.display = 'none';
        document.getElementById('interfaz-partido').style.display = 'flex';
        document.getElementById('d-l-cont').innerText = document.getElementById('nombre-local').value || "LOCAL";
        document.getElementById('d-v-cont').innerText = document.getElementById('nombre-rival').value || "RIVAL";
        guardarTodo(); render();
    }

    function render(){
        const capa = document.getElementById('capa-jugadores'); capa.innerHTML = '';
        const bL = document.getElementById('banquillo-local'); bL.innerHTML = '';
        const bV = document.getElementById('banquillo-rival'); bV.innerHTML = '';

        posicionesPista.forEach(pos => {
            const d = document.createElement('div');
            d.className = 'jugador';
            d.style.border = (jugadorActivo === pos) ? "8px solid #00FF00" : "3px solid #fff";
            d.style.left = pos.x + "%"; d.style.top = pos.y + "%";
            d.style.backgroundColor = pos.portero ? 'var(--portero-color)' : (pos.local ? '#FFD600' : '#D50000');
            d.style.color = pos.local ? '#000' : '#fff';
            d.innerHTML = pos.asignado ? pos.asignado.num : "";
            
            if(pos.asignado) {
                const sn = document.createElement('span'); sn.className = 'nombre-jugador-pista';
                sn.innerText = pos.asignado.nombre; d.appendChild(sn);
            }

            d.onpointerdown = (e) => { e.stopPropagation(); arrastrando = true; jugadorActivo = pos; render(); };
            d.onpointermove = (e) => {
                if (!arrastrando || jugadorActivo !== pos) return;
                const r = document.getElementById('pista').getBoundingClientRect();
                pos.x = Math.max(2, Math.min(98, ((e.clientX - r.left) / r.width) * 100));
                pos.y = Math.max(4, Math.min(96, ((e.clientY - r.top) / r.height) * 100));
                render();
            };
            d.onpointerup = (e) => {
                if (!arrastrando) return; arrastrando = false;
                if (modoActual === 'acciones' && pos.asignado) abrirMenuAcciones(e.clientX, e.clientY);
                else if (modoActual === 'stats' && pos.asignado) mostrarEstadisticaJugador(pos.asignado);
                render(); 
            };
            capa.appendChild(d);
        });

        const ordenar = (a, b) => a.nombre.localeCompare(b.nombre);
        eqL.filter(j => !j.enPista && j.convocado).sort(ordenar).forEach(j => bL.appendChild(crearBotonBanquillo(j)));
        eqV.filter(j => !j.enPista && j.convocado).sort(ordenar).forEach(j => bV.appendChild(crearBotonBanquillo(j)));
        actualizarUIBotones();
    }

    function crearBotonBanquillo(j) {
        const s = document.createElement('div');
        s.style.cssText = `padding:15px 10px; background:#222; margin-bottom:8px; border-radius:10px; cursor:pointer; border-left:8px solid ${j.local?'#FFD600':'#D50000'}; font-weight:bold; font-size:0.9rem; overflow:hidden;`;
        s.innerText = `${j.nombre}`;
        s.onclick = () => {
            if(jugadorActivo && jugadorActivo.local === j.local) {
                if(jugadorActivo.asignado) jugadorActivo.asignado.enPista = false;
                jugadorActivo.asignado = j; j.enPista = true; jugadorActivo = null; render();
            }
        };
        return s;
    }

    function abrirMenuAcciones(x, y) {
        const menu = document.getElementById('menu-acciones'); menu.style.display = 'block';
        menu.style.left = Math.min(x, window.innerWidth - 230) + "px";
        menu.style.top = Math.min(y, window.innerHeight - 450) + "px";
    }

    function cerrarMenuAcciones() { document.getElementById('menu-acciones').style.display = 'none'; }

    function prepararAccion(tipo) {
        accionPendiente = tipo;
        cerrarMenuAcciones();
        document.getElementById('capa-zonas-tacticas').style.display = 'grid';
    }

    function registrarZonaYFinalizar(zonaId) {
        if(!jugadorActivo || !jugadorActivo.asignado || !accionPendiente) return;
        const j = jugadorActivo.asignado;
        const min = document.getElementById('cronometro').innerText;
        const registro = { t: min, z: zonaId };

        if(accionPendiente === 'GOL') {
            j.stats.GOL.push(registro);
            if(j.local) { golesL++; document.getElementById('g-l').innerText = golesL; }
            else { golesV++; document.getElementById('g-v').innerText = golesV; }
        } else if(accionPendiente === 'FALTA') {
            j.stats[`FALTA_P${parteActual}`].push(registro);
            if(j.local) {
                let f = (parteActual===1 ? ++faltasL_P1 : ++faltasL_P2);
                document.getElementById('f-l').innerText = "F: " + f;
            } else {
                let f = (parteActual===1 ? ++faltasV_P1 : ++faltasV_P2);
                document.getElementById('f-v').innerText = "F: " + f;
            }
        } else {
            j.stats[accionPendiente].push(registro);
        }

        document.getElementById('capa-zonas-tacticas').style.display = 'none';
        accionPendiente = null;
        jugadorActivo = null;
        guardarTodo();
        render();
    }

    function crearMiniMapa(stats) {
        const contenedor = document.createElement('div');
        contenedor.className = 'contenedor-mini-mapa';
        contenedor.innerHTML = `<div class="linea-medio"></div><div class="circulo-central"></div><div class="area-6m area-izq"></div><div class="area-6m area-der"></div>`;
        
        const categorias = ['GOL', 'FALTA_P1', 'FALTA_P2', 'TIRO', 'ASISTENCIA', 'AMARILLA', 'ROJA'];
        categorias.forEach(cat => {
            const arr = stats[cat] || [];
            arr.forEach(reg => {
                if(reg.z && centroZonas[reg.z]) {
                    const dot = document.createElement('div');
                    dot.className = 'punto-mapa';
                    const colorKey = cat.startsWith('FALTA') ? 'FALTA' : cat;
                    dot.style.backgroundColor = coloresAcciones[colorKey] || 'white';
                    dot.style.left = centroZonas[reg.z][0] + '%';
                    dot.style.top = centroZonas[reg.z][1] + '%';
                    contenedor.appendChild(dot);
                }
            });
        });
        return contenedor;
    }

    function mostrarEstadisticaEquipo(lado) {
        const modal = document.getElementById('modal-stats');
        const cont = document.getElementById('contenido-stats');
        const eq = (lado === 'LOCAL') ? eqL : eqV;
        
        let statsGlobales = { GOL:[], FALTA_P1:[], FALTA_P2:[], TIRO:[], ASISTENCIA:[], AMARILLA:[], ROJA:[] };
        eq.forEach(j => {
            for(let key in statsGlobales) {
                if(j.stats[key]) statsGlobales[key].push(...j.stats[key]);
            }
        });

        cont.innerHTML = `<h2 style="color:var(--led-verde)">ZONAS EQUIPO ${lado}</h2>`;
        cont.appendChild(crearMiniMapa(statsGlobales));

        let html = `<table class="tabla-stats"><thead><tr><th>#</th><th>NOM</th><th>T</th><th>G</th><th>F</th></tr></thead><tbody>`;
        eq.forEach(j => {
            let fTotal = (j.stats.FALTA_P1?.length || 0) + (j.stats.FALTA_P2?.length || 0);
            html += `<tr><td>${j.num}</td><td style="text-align:left">${j.nombre.substring(0,12)}</td><td>${Math.floor(j.stats.tiempoSeg/60)}'</td><td>${j.stats.GOL.length}</td><td>${fTotal}</td></tr>`;
        });
        html += `</tbody></table>`;
        cont.innerHTML += html;
        modal.style.display = 'flex';
    }

    function mostrarEstadisticaJugador(j) {
        const modal = document.getElementById('modal-stats');
        const cont = document.getElementById('contenido-stats');
        cont.innerHTML = `<h2 style="color:var(--led-verde)">${j.num}. ${j.nombre}</h2>`;
        cont.appendChild(crearMiniMapa(j.stats));
        
        let fTotal = (j.stats.FALTA_P1?.length || 0) + (j.stats.FALTA_P2?.length || 0);
        cont.innerHTML += `<table class="tabla-stats"><tr><th>TIEMPO</th><td>${Math.floor(j.stats.tiempoSeg/60)} min</td></tr><tr><th>GOLES</th><td>${j.stats.GOL.length}</td></tr><tr><th>FALTAS</th><td>${fTotal}</td></tr><tr><th>AMARILLAS</th><td>${j.stats.AMARILLA.length}</td></tr><tr><th>ROJAS</th><td>${j.stats.ROJA.length}</td></tr></table>`;
        modal.style.display = 'flex';
    }

    function toggleModo(m) { 
        if(m === 'timeout') {
            if(modoActual === 'timeout') { 
                modoActual = 'movimiento'; 
                if(tiempoEstabaCorriendoAntesDeTM) corriendo = true; 
            } else { 
                modoActual = 'timeout'; 
                tiempoEstabaCorriendoAntesDeTM = corriendo; 
                corriendo = false; 
            }
        } else {
            modoActual = (modoActual === m) ? 'movimiento' : m; 
        }
        render(); 
    }

    function iniciarJuego(){ corriendo = true; }
    function pararJuego(){ corriendo = false; guardarTodo(); }
    
    function actualizarCrono(){ 
        if(corriendo && tiempo > 0) { 
            tiempo--; 
            let m=Math.floor(tiempo/60), s=tiempo%60; 
            document.getElementById('cronometro').innerText=`${m}:${s<10?'0'+s:s}`; 
            posicionesPista.forEach(p=>{if(p.asignado) p.asignado.stats.tiempoSeg++}); 
        } 
    }
    setInterval(actualizarCrono, 1000);

    function cargarInputsConfig() {
        const iL = document.getElementById('inputs-local'), iV = document.getElementById('inputs-rival');
        for(let i=1; i<=20; i++) {
            iL.innerHTML += `<div class="fila-input-jugador"><input type="checkbox" id="lconv-${i}" class="check-conv" checked><input type="text" id="lnum-${i}" class="input-num" value="${i}"><input type="text" id="lnom-${i}" class="input-nom" placeholder="Jugador ${i}"></div>`;
            iV.innerHTML += `<div class="fila-input-jugador"><input type="checkbox" id="rconv-${i}" class="check-conv" checked><input type="text" id="rnum-${i}" class="input-num" value="${i}"><input type="text" id="rnom-${i}" class="input-nom" placeholder="Jugador ${i}"></div>`;
        }
    }
    
    function volverAConfig() { document.getElementById('interfaz-partido').style.display='none'; document.getElementById('pantalla-config').style.display='flex'; }
    function permutarCampo() { posicionesPista.forEach(p => p.x = 100 - p.x); render(); }
    function alternarParte() { 
        parteActual = (parteActual===1)?2:1; 
        document.getElementById('label-parte').innerText = parteActual + "ª PARTE"; 
        tiempo = 1200; 
        render(); 
    }
    function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    
    function actualizarUIBotones() {
        document.getElementById('btn-acciones').style.background = (modoActual === 'acciones') ? "#fff" : "#673AB7";
        document.getElementById('btn-acciones').style.color = (modoActual === 'acciones') ? "#000" : "#fff";
        document.getElementById('btn-stats').style.background = (modoActual === 'stats') ? "#fff" : "#009688";
        document.getElementById('btn-stats').style.color = (modoActual === 'stats') ? "#000" : "#fff";
        document.getElementById('btn-timeout').style.background = (modoActual === 'timeout') ? "#fff" : "#FF5722";
        document.getElementById('btn-timeout').style.color = (modoActual === 'timeout') ? "#000" : "#fff";
    }

    function manejadorClickCabecera(lado) {
        if(modoActual === 'timeout') {
            let m = Math.floor(tiempo / 60), s = tiempo % 60;
            historialTiemposMuertos.push({ equipo: lado, tiempo: `${m}:${s<10?'0'+s:s}`, parte: parteActual });
            alert("Tiempo Muerto " + lado + " registrado.");
        } else if(modoActual === 'stats') { 
            mostrarEstadisticaEquipo(lado); 
        }
    }

    function exportarEstadisticas() {
        const nomL = document.getElementById('nombre-local').value || "LOCAL";
        const nomV = document.getElementById('nombre-rival').value || "RIVAL";
        let txt = `ESTADÍSTICAS FUTSAL\n==================\n`;
        txt += `PARTIDO: ${nomL} vs ${nomV}\n\n`;

        const procesar = (eqNombre, lista) => {
            let r = `EQUIPO: ${eqNombre}\n--------------------------\n`;
            lista.forEach(j => {
                let fTotal = [...(j.stats.FALTA_P1 || []), ...(j.stats.FALTA_P2 || [])];
                r += `${j.num}. ${j.nombre}\n`;
                r += `   Goles: ${j.stats.GOL.length} [${j.stats.GOL.map(g => g.t + ' Z:' + g.z).join(', ')}]\n`;
                r += `   Faltas: ${fTotal.length}\n   Asistencias: ${j.stats.ASISTENCIA.length}\n   Tiempo: ${Math.floor(j.stats.tiempoSeg/60)} min\n\n`;
            });
            return r;
        };
        txt += procesar(nomL, eqL); txt += procesar(nomV, eqV);
        txt += `\nTIEMPOS MUERTOS:\n`; historialTiemposMuertos.forEach(tm => { txt += `- ${tm.equipo}: Parte ${tm.parte} (Crono: ${tm.tiempo})\n`; });
        let blob = new Blob([txt], {type: "text/plain;charset=utf-8"});
        let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Futsal_Stats.txt`; a.click();
    }

    function activarKeepAwake() { if('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{}); }
    function limpiarTodo() { if(confirm("¿Borrar todos los datos?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => { cargarInputsConfig(); recuperarSesion(); };
</script>
